<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>TN BusTrack - Offline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#F8FAFC;color:#0F172A;min-height:100dvh;display:grid;place-items:center;text-align:center;padding:24px}
.card{background:rgba(255,255,255,0.95);border:1px solid rgba(0,0,0,0.08);border-radius:24px;padding:48px 32px;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,0.08)}
.icon{width:72px;height:72px;background:#E53935;border-radius:18px;display:grid;place-items:center;margin:0 auto 24px;font-size:32px;font-weight:900;color:white;box-shadow:0 0 30px rgba(229,57,53,0.3)}
h1{font-size:20px;margin-bottom:8px}
p{font-size:14px;color:#64748B;line-height:1.6}
.btn{margin-top:24px;display:inline-block;padding:12px 28px;background:#E53935;color:white;border:0;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;transition:opacity .2s}
.btn:hover{opacity:.85}
</style>
</head>
<body>
<div class="card">
<div class="icon">🚌</div>
<h1>You're offline</h1>
<p>Connect to the internet to see live bus tracking, routes, and alerts.</p>
<a class="btn" href="/">Try again</a>
</div>
</body>
</html>
